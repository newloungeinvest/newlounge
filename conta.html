<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Conta — NewLounge Sport</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
      --border:#2a2a2a;--border2:#333;
      --cyan:#00E5FF;--cyan2:#80F0FF;
      --green:#34C759;--red:#FF3B30;--warn:#FF9500;
      --text:#F5F5F5;--text2:#999;--text3:#555;
      --ff:'Inter',-apple-system,sans-serif;--r:8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:var(--ff);font-size:15px;min-height:100vh;}
    a{color:inherit;text-decoration:none;}

    /* HEADER */
    .header{
      background:rgba(10,10,10,.97);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:0 24px;height:58px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;
    }
    .logo{font-size:18px;font-weight:800;}
    .logo span{color:var(--cyan);}
    .h-back{font-size:13px;color:var(--text2);transition:color .2s;}
    .h-back:hover{color:var(--cyan);}

    /* LAYOUT */
    .page{max-width:1000px;margin:0 auto;padding:40px 24px 80px;}

    /* LOGIN/REGISTER TABS */
    .auth-wrap{max-width:460px;margin:0 auto;}
    .auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;}
    .auth-tab{
      flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;
      cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all .2s;
    }
    .auth-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
    .auth-form{display:none;}
    .auth-form.active{display:block;}

    label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
    input,select{
      width:100%;background:var(--bg3);border:1px solid var(--border2);
      border-radius:6px;color:var(--text);font-family:var(--ff);font-size:14px;
      padding:11px 14px;outline:none;transition:border-color .2s;-webkit-appearance:none;margin-bottom:16px;
    }
    input:focus{border-color:var(--cyan);}
    input::placeholder{color:var(--text3);}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:13px 24px;border-radius:var(--r);font-family:var(--ff);
      font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s;
    }
    .btn-full{width:100%;}
    .btn-cyan{background:var(--cyan);color:#000;}
    .btn-cyan:hover{background:var(--cyan2);}
    .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
    .btn-ghost:hover{border-color:var(--cyan);color:var(--cyan);}
    .btn-red{background:transparent;border:1px solid #3a1a1a;color:var(--red);}

    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .msg-err{font-size:13px;color:var(--red);margin-bottom:12px;display:none;}
    .msg-ok{font-size:13px;color:var(--green);margin-bottom:12px;display:none;}

    /* DASHBOARD */
    #dashboard{display:none;}
    .dash-header-row{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:28px;flex-wrap:wrap;gap:12px;
    }
    .dash-welcome h2{font-size:22px;font-weight:800;}
    .dash-welcome p{font-size:13px;color:var(--text2);}

    /* ABAS DO DASHBOARD */
    .dash-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;scrollbar-width:none;}
    .dash-tab{
      padding:10px 18px;font-size:13px;font-weight:500;
      border-bottom:2px solid transparent;color:var(--text2);
      cursor:pointer;background:none;border:none;font-family:var(--ff);
      border-bottom:2px solid transparent;transition:color .2s;white-space:nowrap;
    }
    .dash-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
    .dash-content{display:none;}
    .dash-content.active{display:block;}

    /* PEDIDOS */
    .pedido-card{
      background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
      padding:20px;margin-bottom:14px;
    }
    .pedido-top{
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
      margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);
    }
    .ped-num{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
    .ped-num strong{font-size:15px;color:var(--cyan);font-family:monospace;}
    .ped-status{
      font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;
    }
    .s-aguardando{background:rgba(255,149,0,.15);color:var(--warn);}
    .s-aprovado{background:rgba(52,199,89,.15);color:var(--green);}
    .s-enviado{background:rgba(0,229,255,.15);color:var(--cyan);}
    .s-entregue{background:rgba(52,199,89,.2);color:var(--green);}
    .s-cancelado{background:rgba(255,59,48,.15);color:var(--red);}
    .ped-itens{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
    .ped-item-foto{
      width:56px;height:56px;border-radius:6px;background:var(--bg3);overflow:hidden;
      display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
    }
    .ped-item-foto img{width:100%;height:100%;object-fit:cover;}
    .ped-bottom{
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
    }
    .ped-total{font-size:18px;font-weight:800;color:var(--cyan);}
    .ped-data{font-size:12px;color:var(--text3);}
    .ped-rastreio{font-size:12px;color:var(--text2);}

    /* ENDEREÇOS */
    .end-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
    .end-card{
      background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;
      position:relative;
    }
    .end-card.principal{border-color:var(--cyan);}
    .end-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--cyan);margin-bottom:6px;}
    .end-nome{font-size:14px;font-weight:700;margin-bottom:4px;}
    .end-info{font-size:13px;color:var(--text2);line-height:1.65;}
    .end-principal-badge{
      position:absolute;top:12px;right:12px;
      font-size:9px;font-weight:700;background:var(--cyan);color:#000;
      padding:2px 8px;border-radius:999px;
    }
    .btn-add-end{
      border:2px dashed var(--border2);border-radius:var(--r);
      padding:24px;text-align:center;cursor:pointer;
      transition:border-color .2s;font-size:13px;color:var(--text2);
      background:transparent;width:100%;font-family:var(--ff);
    }
    .btn-add-end:hover{border-color:var(--cyan);color:var(--cyan);}

    /* DADOS PESSOAIS */
    .dados-form{max-width:540px;}

    /* FAVORITOS */
    .favs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
    .fav-card{
      background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
      overflow:hidden;cursor:pointer;transition:all .2s;
    }
    .fav-card:hover{border-color:rgba(0,229,255,.3);}
    .fav-foto{aspect-ratio:1;background:var(--bg3);overflow:hidden;}
    .fav-foto img{width:100%;height:100%;object-fit:cover;}
    .fav-body{padding:12px;}
    .fav-nome{font-size:13px;font-weight:600;margin-bottom:4px;}
    .fav-preco{font-size:15px;font-weight:700;color:var(--cyan);}

    /* MODAL ADD ENDEREÇO */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;
      display:none;align-items:center;justify-content:center;padding:20px;
    }
    .modal-overlay.open{display:flex;}
    .modal-box{
      background:var(--bg2);border:1px solid var(--border);border-radius:12px;
      width:100%;max-width:480px;overflow:hidden;
    }
    .modal-header{
      padding:18px 20px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
    }
    .modal-header h3{font-size:15px;font-weight:700;}
    .modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;}
    .modal-body{padding:20px;}
    .modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}

    /* EMPTY */
    .empty{text-align:center;padding:48px;color:var(--text2);}
    .empty .ico{font-size:48px;margin-bottom:12px;}

    /* SPINNER */
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,229,255,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 24px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .toast.ok{border-color:var(--green);color:var(--green);}
    .toast.err{border-color:var(--red);color:var(--red);}

    @media(max-width:600px){
      .page{padding:24px 14px 60px;}
      .form-row{grid-template-columns:1fr;}
      .dash-welcome h2{font-size:18px;}
    }
      .logo img{height:38px;width:auto;display:block;}
    .logo{display:flex;align-items:center;}
  </style>
</head>
<body>

<header class="header">
  <a href="loja.html" class="logo">NEWLOUNGE<span> SPORT</span></a>
  <a href="loja.html" class="h-back">← Voltar à loja</a>
</header>

<div class="page" id="page">

  <!-- AUTH (login / cadastro) -->
  <div id="auth-wrap" class="auth-wrap">
    <div style="text-align:center;margin-bottom:28px;">
      <h1 style="font-size:24px;font-weight:800;margin-bottom:6px;">Minha Conta</h1>
      <p style="font-size:14px;color:var(--text2);">Entre ou crie sua conta para acompanhar seus pedidos</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="setAuthTab('login',this)">Entrar</div>
      <div class="auth-tab" onclick="setAuthTab('cadastro',this)">Criar conta</div>
    </div>

    <!-- LOGIN -->
    <div class="auth-form active" id="form-login">
      <p class="msg-err" id="login-err"></p>
      <div>
        <label>E-mail</label>
        <input type="email" id="l-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div>
        <label>Senha</label>
        <input type="password" id="l-senha" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-cyan btn-full" id="btn-entrar" onclick="fazerLogin()">Entrar</button>
      <p style="text-align:center;margin-top:14px;font-size:13px;color:var(--text2);">
        Não tem conta? <span style="color:var(--cyan);cursor:pointer;" onclick="setAuthTab('cadastro',null)">Criar agora</span>
      </p>
    </div>

    <!-- CADASTRO -->
    <div class="auth-form" id="form-cadastro">
      <p class="msg-err" id="cad-err"></p>
      <p class="msg-ok"  id="cad-ok"></p>
      <div class="form-row">
        <div><label>Nome</label><input type="text" id="c-nome" placeholder="Seu nome"></div>
        <div><label>Sobrenome</label><input type="text" id="c-sobre" placeholder="Seu sobrenome"></div>
      </div>
      <div><label>E-mail *</label><input type="email" id="c-email" placeholder="seu@email.com"></div>
      <div><label>Telefone</label><input type="tel" id="c-fone" placeholder="(82) 99999-9999"></div>
      <div><label>Senha * (mínimo 6 caracteres)</label><input type="password" id="c-senha" placeholder="••••••••"></div>
      <div>
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;cursor:pointer;">
          <input type="checkbox" id="c-news" style="width:16px;height:16px;margin-bottom:0;accent-color:var(--cyan);">
          <span style="font-size:13px;color:var(--text2);">Quero receber promoções por e-mail</span>
        </label>
      </div>
      <button class="btn btn-cyan btn-full" style="margin-top:16px;" id="btn-cadastrar" onclick="fazerCadastro()">Criar conta</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">
    <div class="dash-header-row">
      <div class="dash-welcome">
        <h2 id="dash-nome">Olá! 👋</h2>
        <p id="dash-email" style="color:var(--text2);font-size:13px;"></p>
      </div>
      <button class="btn btn-ghost" style="font-size:13px;" onclick="fazerLogout()">Sair</button>
    </div>

    <div class="dash-tabs">
      <button class="dash-tab active" onclick="setDashTab('pedidos',this)">📦 Meus pedidos</button>
      <button class="dash-tab" onclick="setDashTab('favoritos',this)">❤️ Favoritos</button>
      <button class="dash-tab" onclick="setDashTab('enderecos',this)">📍 Endereços</button>
      <button class="dash-tab" onclick="setDashTab('dados',this)">👤 Meus dados</button>
    </div>

    <!-- PEDIDOS -->
    <div class="dash-content active" id="tab-pedidos">
      <div id="pedidos-lista">
        <div style="text-align:center;padding:40px;"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- FAVORITOS -->
    <div class="dash-content" id="tab-favoritos">
      <div id="favs-lista">
        <div style="text-align:center;padding:40px;"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- ENDEREÇOS -->
    <div class="dash-content" id="tab-enderecos">
      <div id="end-lista"></div>
    </div>

    <!-- DADOS PESSOAIS -->
    <div class="dash-content" id="tab-dados">
      <div class="dados-form">
        <div class="form-row">
          <div><label>Nome</label><input type="text" id="d-nome" placeholder="Seu nome"></div>
          <div><label>Sobrenome</label><input type="text" id="d-sobre" placeholder="Seu sobrenome"></div>
        </div>
        <div><label>E-mail</label><input type="email" id="d-email" disabled style="opacity:.5;cursor:not-allowed;"></div>
        <div><label>Telefone</label><input type="tel" id="d-fone" placeholder="(82) 99999-9999"></div>
        <button class="btn btn-cyan" onclick="salvarDados()">Salvar alterações</button>
        <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--border);">
          <p style="font-size:13px;color:var(--text2);margin-bottom:12px;">Zona de perigo</p>
          <button class="btn btn-red btn-full" onclick="solicitarExclusao()">Solicitar exclusão de conta</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL ADD ENDEREÇO -->
<div id="modal-end" class="modal-overlay" onclick="fecharModalEnd(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header"><h3>Novo endereço</h3><button class="modal-close" onclick="document.getElementById('modal-end').classList.remove('open')">×</button></div>
    <div class="modal-body">
      <div><label>Apelido</label><input type="text" id="e-apelido" placeholder="Casa, Trabalho..."></div>
      <div><label>Nome do destinatário</label><input type="text" id="e-nome-dest" placeholder="Quem vai receber?"></div>
      <div><label>CEP *</label><input type="text" id="e-cep" placeholder="00000-000" oninput="buscarCEPEnd(this)" maxlength="9"></div>
      <div><label>Logradouro *</label><input type="text" id="e-logr"></div>
      <div class="form-row">
        <div><label>Número *</label><input type="text" id="e-num"></div>
        <div><label>Complemento</label><input type="text" id="e-comp"></div>
      </div>
      <div class="form-row">
        <div><label>Bairro *</label><input type="text" id="e-bairro"></div>
        <div><label>Cidade *</label><input type="text" id="e-cidade"></div>
      </div>
      <div style="max-width:100px;"><label>Estado *</label><input type="text" id="e-estado" maxlength="2"></div>
      <div style="margin-top:4px;">
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;cursor:pointer;">
          <input type="checkbox" id="e-principal" style="width:16px;height:16px;margin-bottom:0;accent-color:var(--cyan);">
          <span style="font-size:13px;color:var(--text);">Usar como endereço principal</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-end').classList.remove('open')">Cancelar</button>
      <button class="btn btn-cyan" onclick="salvarEndereco()">Salvar endereço</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://cdobspwhlvspoxblorfx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jnYS9jYYd4Oq5D8XD24a4w_CFNvXy_y';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Logo da loja — cole a URL pública do Supabase Storage aqui:
const LOGO_URL = 'COLE_URL_DA_LOGO_AQUI';
window.addEventListener('DOMContentLoaded',()=>{if(LOGO_URL&&!LOGO_URL.includes('COLE_URL')){document.querySelectorAll('.logo').forEach(el=>{el.innerHTML='<img src=\"'+LOGO_URL+'\" alt=\"NewLounge Sport\">';});}});

let sessao  = null;
let cliente = null;

// ===== INIT =====
window.addEventListener('load', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { sessao = session; await mostrarDashboard(); }

  document.getElementById('l-senha').addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
});

// ===== AUTH TABS =====
function setAuthTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  if (el) el.classList.add('active');
  else document.querySelectorAll('.auth-tab')[tab === 'cadastro' ? 1 : 0].classList.add('active');
  document.getElementById('form-' + tab).classList.add('active');
}

// ===== LOGIN =====
async function fazerLogin() {
  const email = document.getElementById('l-email').value.trim();
  const senha = document.getElementById('l-senha').value;
  const btn   = document.getElementById('btn-entrar');
  const err   = document.getElementById('login-err');
  err.style.display = 'none';
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) { err.textContent = 'E-mail ou senha incorretos.'; err.style.display = 'block'; return; }
  sessao = data.session;
  await mostrarDashboard();
}

// ===== CADASTRO =====
async function fazerCadastro() {
  const nome  = document.getElementById('c-nome').value.trim();
  const sobre = document.getElementById('c-sobre').value.trim();
  const email = document.getElementById('c-email').value.trim();
  const fone  = document.getElementById('c-fone').value.trim();
  const senha = document.getElementById('c-senha').value;
  const news  = document.getElementById('c-news').checked;
  const err   = document.getElementById('cad-err');
  const ok    = document.getElementById('cad-ok');
  err.style.display = ok.style.display = 'none';
  if (!email || !senha) { err.textContent = 'E-mail e senha são obrigatórios.'; err.style.display = 'block'; return; }
  if (senha.length < 6) { err.textContent = 'A senha precisa ter no mínimo 6 caracteres.'; err.style.display = 'block'; return; }
  const btn = document.getElementById('btn-cadastrar');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const { data, error } = await sb.auth.signUp({ email, password: senha });
  if (error) { err.textContent = error.message; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Criar conta'; return; }
  // Salvar perfil
  if (data.user) {
    await sb.from('clientes_loja').upsert({
      auth_user_id: data.user.id,
      nome:    (nome + ' ' + sobre).trim() || email.split('@')[0],
      email,
      telefone: fone,
      aceita_newsletter: news,
    }, { onConflict: 'email' });
  }
  btn.disabled = false; btn.textContent = 'Criar conta';
  ok.textContent = '✅ Conta criada! Verifique seu e-mail para confirmar.';
  ok.style.display = 'block';
}

// ===== LOGOUT =====
async function fazerLogout() {
  await sb.auth.signOut();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('auth-wrap').style.display = 'block';
  sessao = cliente = null;
}

// ===== DASHBOARD =====
async function mostrarDashboard() {
  document.getElementById('auth-wrap').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  // Buscar perfil
  const { data } = await sb.from('clientes_loja')
    .select('*').eq('auth_user_id', sessao.user.id).single();
  cliente = data;
  const nomeExib = cliente?.nome || sessao.user.email.split('@')[0];
  document.getElementById('dash-nome').textContent  = 'Olá, ' + nomeExib.split(' ')[0] + '! 👋';
  document.getElementById('dash-email').textContent = sessao.user.email;
  if (cliente) {
    document.getElementById('d-nome').value  = cliente.nome?.split(' ')[0] || '';
    document.getElementById('d-sobre').value = cliente.nome?.split(' ').slice(1).join(' ') || '';
    document.getElementById('d-email').value = cliente.email;
    document.getElementById('d-fone').value  = cliente.telefone || '';
  }
  carregarPedidos();
  carregarFavoritos();
  carregarEnderecos();
}

// ===== DASH TABS =====
function setDashTab(tab, el) {
  document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.dash-content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ===== PEDIDOS =====
async function carregarPedidos() {
  const { data } = await sb.from('pedidos')
    .select('*, itens_pedido(*)')
    .eq('cliente_email', sessao.user.email)
    .order('criado_em', { ascending: false });
  const el = document.getElementById('pedidos-lista');
  if (!data || !data.length) {
    el.innerHTML = `<div class="empty"><div class="ico">📦</div><p>Você ainda não fez nenhum pedido.</p><a href="loja.html" class="btn btn-cyan" style="margin-top:16px;display:inline-flex;">Ir às compras</a></div>`;
    return;
  }
  const statusCls = s => {
    if (s === 'pagamento_aprovado' || s === 'entregue') return 's-aprovado';
    if (s === 'enviado') return 's-enviado';
    if (s === 'cancelado') return 's-cancelado';
    if (s === 'entregue') return 's-entregue';
    return 's-aguardando';
  };
  const statusTxt = s => s.replace(/_/g,' ').replace(/^\w/,c=>c.toUpperCase());
  el.innerHTML = data.map(p => `
    <div class="pedido-card">
      <div class="pedido-top">
        <div class="ped-num">Pedido <strong>#${p.numero}</strong></div>
        <span class="ped-status ${statusCls(p.status)}">${statusTxt(p.status)}</span>
      </div>
      <div class="ped-itens">
        ${(p.itens_pedido||[]).map(i => `
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="ped-item-foto">${i.produto_foto ? `<img src="${i.produto_foto}">` : '👕'}</div>
            <div><div style="font-size:13px;font-weight:600;">${i.produto_nome}</div>
            <div style="font-size:11px;color:var(--text2);">${[i.variante_tamanho,i.variante_cor].filter(Boolean).join(' · ')} · Qtd: ${i.quantidade}</div></div>
          </div>`).join('')}
      </div>
      <div class="ped-bottom">
        <div>
          <div class="ped-total">${fmt(p.total)}</div>
          <div class="ped-data">${new Date(p.criado_em).toLocaleDateString('pt-BR')}</div>
        </div>
        ${p.codigo_rastreamento ? `<div class="ped-rastreio">📦 Rastreio: <strong>${p.codigo_rastreamento}</strong></div>` : ''}
      </div>
    </div>`).join('');
}

// ===== FAVORITOS =====
async function carregarFavoritos() {
  const favIds = JSON.parse(localStorage.getItem('vs_favs') || '[]');
  const el = document.getElementById('favs-lista');
  if (!favIds.length) {
    el.innerHTML = `<div class="empty"><div class="ico">🤍</div><p>Você ainda não tem favoritos.</p></div>`;
    return;
  }
  const { data } = await sb.from('produtos').select('*').in('id', favIds).eq('ativo', true);
  if (!data || !data.length) { el.innerHTML = `<div class="empty"><div class="ico">🤍</div><p>Nenhum favorito disponível.</p></div>`; return; }
  el.innerHTML = `<div class="favs-grid">${data.map(p => `
    <div class="fav-card" onclick="window.location.href='produto?id=${p.id}'">
      <div class="fav-foto">${p.foto_principal ? `<img src="${p.foto_principal}">` : '<div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;background:var(--bg3);">👕</div>'}</div>
      <div class="fav-body">
        <div class="fav-nome">${p.nome}</div>
        <div class="fav-preco">${fmt(p.preco_promo || p.preco)}</div>
      </div>
    </div>`).join('')}</div>`;
}

// ===== ENDEREÇOS =====
async function carregarEnderecos() {
  if (!cliente) return;
  const { data } = await sb.from('enderecos_cliente').select('*').eq('cliente_id', cliente.id);
  const el = document.getElementById('end-lista');
  let html = '<div class="end-grid">';
  (data || []).forEach(e => {
    html += `<div class="end-card ${e.principal ? 'principal' : ''}">
      ${e.principal ? '<span class="end-principal-badge">Principal</span>' : ''}
      <div class="end-label">${e.apelido || 'Endereço'}</div>
      <div class="end-nome">${e.nome_destinatario}</div>
      <div class="end-info">${e.logradouro}, ${e.numero}${e.complemento ? ' — ' + e.complemento : ''}<br>${e.bairro} — ${e.cidade}/${e.estado}<br>CEP: ${e.cep}</div>
    </div>`;
  });
  html += `<button class="btn-add-end" onclick="document.getElementById('modal-end').classList.add('open')">+ Adicionar novo endereço</button></div>`;
  el.innerHTML = html;
}

async function buscarCEPEnd(input) {
  let v = input.value.replace(/\D/g,'').substring(0,8);
  if (v.length > 5) v = v.replace(/(\d{5})(\d)/,'$1-$2');
  input.value = v;
  if (v.replace('-','').length !== 8) return;
  const r = await fetch(`https://viacep.com.br/ws/${v.replace('-','')}/json/`);
  const d = await r.json();
  if (!d.erro) {
    document.getElementById('e-logr').value   = d.logradouro || '';
    document.getElementById('e-bairro').value = d.bairro || '';
    document.getElementById('e-cidade').value = d.localidade || '';
    document.getElementById('e-estado').value = d.uf || '';
  }
}

async function salvarEndereco() {
  if (!cliente) return;
  const dados = {
    cliente_id: cliente.id,
    apelido: document.getElementById('e-apelido').value.trim() || 'Casa',
    nome_destinatario: document.getElementById('e-nome-dest').value.trim(),
    cep: document.getElementById('e-cep').value.trim(),
    logradouro: document.getElementById('e-logr').value.trim(),
    numero: document.getElementById('e-num').value.trim(),
    complemento: document.getElementById('e-comp').value.trim(),
    bairro: document.getElementById('e-bairro').value.trim(),
    cidade: document.getElementById('e-cidade').value.trim(),
    estado: document.getElementById('e-estado').value.trim(),
    principal: document.getElementById('e-principal').checked,
  };
  await sb.from('enderecos_cliente').insert(dados);
  document.getElementById('modal-end').classList.remove('open');
  toast('Endereço salvo!', 'ok');
  await carregarEnderecos();
}

function fecharModalEnd(e) {
  if (e.target === document.getElementById('modal-end')) document.getElementById('modal-end').classList.remove('open');
}

// ===== DADOS =====
async function salvarDados() {
  if (!cliente) return;
  const nome = (document.getElementById('d-nome').value + ' ' + document.getElementById('d-sobre').value).trim();
  const fone = document.getElementById('d-fone').value.trim();
  await sb.from('clientes_loja').update({ nome, telefone: fone }).eq('id', cliente.id);
  toast('Dados atualizados!', 'ok');
}

async function solicitarExclusao() {
  if (!confirm('Solicitar exclusão da sua conta? Entraremos em contato para confirmar.')) return;
  toast('Solicitação enviada. Entraremos em contato em até 5 dias úteis.', 'ok');
}

// ===== UTILS =====
function fmt(v) { return 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
let toastT;
function toast(msg, tipo='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${tipo}`;
  clearTimeout(toastT); toastT = setTimeout(() => el.className = 'toast', 3000);
}
</script>
</body>
