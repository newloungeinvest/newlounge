<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia do Esporte — NewLounge Sport</title>
  <meta name="description" content="Conheça a história, regras, medidas e equipamentos de cada esporte. Guia completo da NewLounge Sport.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:    #F5F7FA;
      --bg2:   #FFFFFF;
      --bg3:   #EEF2F7;
      --bg4:   #E5EAF0;
      --border:#DDE3ED;
      --cyan:  #0066FF;
      --cyan2: #3385FF;
      --red:   #FF3B30;
      --green: #28A745;
      --gold:  #FFB700;
      --text:  #111827;
      --text2: #6B7280;
      --text3: #9CA3AF;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --shadow2:0 8px 32px rgba(0,0,0,.12);
      --ff:    'Inter', -apple-system, sans-serif;
      --r:     10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:var(--ff);font-size:15px;line-height:1.6;overflow-x:hidden;}
    a{text-decoration:none;color:inherit;}
    img{max-width:100%;display:block;}

    /* ===== TOPBAR ===== */
    .topbar{background:var(--cyan);color:#fff;text-align:center;padding:8px 16px;font-size:12.5px;font-weight:500;}

    /* ===== HEADER ===== */
    header.site-header{
      background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
      box-shadow:0 1px 8px rgba(0,0,0,.04);
    }
    .header-in{max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:20px;justify-content:space-between;}
    .logo{font-size:21px;font-weight:800;letter-spacing:-.5px;color:var(--text);}
    .logo span{color:var(--cyan);}
    .logo img{height:38px;width:auto;}
    .header-actions{display:flex;align-items:center;gap:18px;}
    .h-link{font-size:13.5px;font-weight:500;color:#374151;transition:color .18s;}
    .h-link:hover{color:var(--cyan);}

    /* ===== HERO ===== */
    .hero{
      position:relative;min-height:340px;display:flex;align-items:flex-end;
      background-size:cover;background-position:center;color:#fff;overflow:hidden;
    }
    .hero::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(180deg, rgba(10,20,40,.35) 0%, rgba(10,20,40,.55) 50%, rgba(10,20,40,.88) 100%);
    }
    .hero-content{position:relative;z-index:2;max-width:1200px;margin:0 auto;width:100%;padding:40px 20px;}
    .hero-emoji{font-size:42px;margin-bottom:8px;}
    .hero h1{font-size:clamp(32px,6vw,56px);font-weight:800;letter-spacing:-1px;line-height:1.05;margin-bottom:10px;text-shadow:0 2px 20px rgba(0,0,0,.4);}
    .hero-tagline{font-size:clamp(15px,2.5vw,20px);font-weight:400;opacity:.95;max-width:640px;text-shadow:0 1px 8px rgba(0,0,0,.5);}
    .hero-back{
      position:relative;z-index:2;display:inline-flex;align-items:center;gap:6px;
      color:#fff;font-size:13px;font-weight:600;margin-bottom:auto;
      background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
      padding:8px 16px;border-radius:30px;border:1px solid rgba(255,255,255,.25);
      transition:all .2s;
    }
    .hero-back:hover{background:rgba(255,255,255,.28);}
    .hero-top{position:relative;z-index:2;max-width:1200px;margin:0 auto;width:100%;padding:20px 20px 0;}

    /* ===== CONTAINER ===== */
    .wrap{max-width:1000px;margin:0 auto;padding:0 20px;}
    section.block{padding:48px 0;border-bottom:1px solid var(--border);}
    section.block:last-of-type{border-bottom:none;}
    .block-label{
      display:inline-block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
      color:var(--cyan);margin-bottom:12px;
    }
    .block h2{font-size:clamp(24px,4vw,32px);font-weight:800;letter-spacing:-.5px;margin-bottom:20px;color:var(--text);}
    .block h3{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text);}
    .prose{font-size:16px;line-height:1.75;color:#374151;}
    .prose p{margin-bottom:16px;}
    .prose p:last-child{margin-bottom:0;}

    /* ===== CARDS GRID ===== */
    .grid{display:grid;gap:16px;}
    .grid-2{grid-template-columns:repeat(2,1fr);}
    .grid-3{grid-template-columns:repeat(3,1fr);}
    .info-card{
      background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:20px;
      transition:all .2s;
    }
    .info-card:hover{border-color:var(--cyan);box-shadow:0 4px 16px rgba(0,102,255,.1);transform:translateY(-2px);}
    .info-card h3{margin-bottom:6px;}
    .info-card p{font-size:14px;color:var(--text2);line-height:1.6;}

    /* ===== TABELA MEDIDAS ===== */
    .medidas-tabela{background:#fff;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;}
    .medida-row{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);}
    .medida-row:last-child{border-bottom:none;}
    .medida-row:nth-child(even){background:var(--bg3);}
    .medida-item{font-size:14.5px;color:#374151;font-weight:500;}
    .medida-valor{font-size:15px;color:var(--cyan);font-weight:700;}

    /* ===== COMO ESCOLHER ===== */
    .escolher-item{
      background:#fff;border-left:3px solid var(--gold);border-radius:0 10px 10px 0;
      padding:18px 22px;margin-bottom:14px;box-shadow:var(--shadow);
    }
    .escolher-item h3{color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
    .escolher-item .num{
      display:inline-flex;align-items:center;justify-content:center;
      width:24px;height:24px;border-radius:50%;background:var(--gold);color:#fff;
      font-size:13px;font-weight:700;flex-shrink:0;
    }
    .escolher-item p{font-size:14.5px;color:var(--text2);line-height:1.65;}

    /* ===== CURIOSIDADES ===== */
    .curiosidades{background:linear-gradient(135deg,#EEF4FF,#F5F8FF);border:1px solid #D6E4FF;border-radius:14px;padding:24px 28px;}
    .curiosidades h3{color:var(--cyan);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .curiosidade-item{display:flex;gap:12px;margin-bottom:12px;font-size:15px;color:#374151;line-height:1.6;}
    .curiosidade-item:last-child{margin-bottom:0;}
    .curiosidade-item .dot{color:var(--gold);font-size:18px;flex-shrink:0;line-height:1.4;}

    /* ===== CTA ===== */
    .cta-box{
      background:linear-gradient(135deg,var(--cyan),var(--cyan2));border-radius:18px;
      padding:40px;text-align:center;color:#fff;margin:48px 0;
    }
    .cta-box h2{color:#fff;margin-bottom:10px;}
    .cta-box p{font-size:16px;opacity:.95;margin-bottom:24px;max-width:480px;margin-left:auto;margin-right:auto;}
    .btn-cta{
      display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--cyan);
      font-size:16px;font-weight:700;padding:15px 34px;border-radius:50px;transition:all .2s;
      box-shadow:0 6px 20px rgba(0,0,0,.2);
    }
    .btn-cta:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.28);}

    /* ===== OUTROS ESPORTES ===== */
    .outros{padding:48px 0;background:var(--bg3);}
    .outros-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;max-width:1000px;margin:24px auto 0;padding:0 20px;}
    .outro-card{
      background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px 10px;
      text-align:center;transition:all .2s;cursor:pointer;
    }
    .outro-card:hover{border-color:var(--cyan);transform:translateY(-3px);box-shadow:var(--shadow);}
    .outro-card .e{font-size:30px;margin-bottom:6px;}
    .outro-card .n{font-size:12.5px;font-weight:600;color:#374151;}

    /* ===== FOOTER ===== */
    footer{background:#1A2340;color:#fff;padding:40px 20px;text-align:center;}
    footer .logo{color:#fff;justify-content:center;margin-bottom:10px;}
    footer p{font-size:13px;color:#94A3B8;}

    /* ===== LOADING / ERRO ===== */
    .loading{text-align:center;padding:80px 20px;color:var(--text2);}
    .erro-404{text-align:center;padding:80px 20px;}
    .erro-404 .big{font-size:64px;margin-bottom:16px;}
    .erro-404 h1{font-size:26px;margin-bottom:10px;}
    .erro-404 p{color:var(--text2);margin-bottom:24px;}

    /* ===== RESPONSIVO ===== */
    @media(max-width:768px){
      .grid-2,.grid-3{grid-template-columns:1fr;}
      .header-in{padding:12px 16px;gap:12px;}
      .h-link.hide-mob{display:none;}
      section.block{padding:36px 0;}
      .cta-box{padding:30px 24px;}
      .hero{min-height:280px;}
    }
  </style>
</head>

// ====== LER SLUG DA URL ======
function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get('s') || params.get('esporte') || '';
}

// ====== NORMALIZAR DADOS DO BANCO ======
// O banco usa como_escolher (snake_case); a página usa comoEscolher (camelCase).
function normalizar(row) {
  if (!row) return null;
  return {
    nome: row.nome,
    emoji: row.emoji,
    tagline: row.tagline,
    cor: row.cor,
    imagem_hero: row.imagem_hero,
    historia: row.historia,
    quadras: row.quadras || [],
    medidas: row.medidas || [],
    equipamentos: row.equipamentos || [],
    comoEscolher: row.como_escolher || [],
    curiosidades: row.curiosidades || [],
  };
}

// Lista de esportes para a seção "outros" (vem do banco ou fallback)
let listaEsportes = [];

// ====== BUSCAR DO BANCO (com fallback ao conteúdo embutido) ======
async function carregarEsporte(slug) {
  try {
    // Busca o esporte específico e a lista de todos (para "outros esportes")
    const [umResp, todosResp] = await Promise.all([
      sb.from('esportes_conteudo').select('*').eq('slug', slug).eq('ativo', true).single(),
      sb.from('esportes_conteudo').select('slug,nome,emoji').eq('ativo', true).order('ordem'),
    ]);
    if (todosResp.data && todosResp.data.length) {
      listaEsportes = todosResp.data;
    }
    if (umResp.data) {
      return normalizar(umResp.data);
    }
  } catch(e) {
    // Banco indisponível — usa fallback
  }
  // Fallback: conteúdo embutido
  if (!listaEsportes.length) {
    listaEsportes = Object.keys(ESPORTES_ALL).map(s => ({ slug:s, nome:ESPORTES_ALL[s].nome, emoji:ESPORTES_ALL[s].emoji }));
  }
  return ESPORTES_ALL[slug] || null;
}

    html += `
      <section class="block">
        <span class="block-label">Medidas oficiais</span>
        <h2>Dimensões e especificações</h2>
        <div class="medidas-tabela">
          ${dados.medidas.map(m => `
            <div class="medida-row">
              <span class="medida-item">${m.item}</span>
              <span class="medida-valor">${m.valor}</span>
            </div>`).join('')}
        </div>
      </section>`;
  }

  // EQUIPAMENTOS
  if (dados.equipamentos && dados.equipamentos.length) {
    html += `
      <section class="block">
        <span class="block-label">Conheça o material</span>
        <h2>Equipamentos e como reconhecê-los</h2>
        <div class="grid grid-2">
          ${dados.equipamentos.map(e => `
            <div class="info-card">
              <h3>${e.nome}</h3>
              <p>${e.desc}</p>
            </div>`).join('')}
        </div>
      </section>`;
  }

  // COMO ESCOLHER
  if (dados.comoEscolher && dados.comoEscolher.length) {
    html += `
      <section class="block">
        <span class="block-label">Guia de compra</span>
        <h2>Como escolher seu equipamento</h2>
        ${dados.comoEscolher.map((c, i) => `
          <div class="escolher-item">
            <h3><span class="num">${i+1}</span> ${c.titulo}</h3>
            <p>${c.desc}</p>
          </div>`).join('')}
      </section>`;
  }

  // CURIOSIDADES
  if (dados.curiosidades && dados.curiosidades.length) {
    html += `
      <section class="block">
        <div class="curiosidades">
          <h3>💡 Você sabia?</h3>
          ${dados.curiosidades.map(c => `
            <div class="curiosidade-item">
              <span class="dot">▪</span>
              <span>${c}</span>
            </div>`).join('')}
        </div>
      </section>`;
  }

  // CTA — ver produtos
  html += `
      <div class="cta-box">
        <h2>Pronto para jogar?</h2>
        <p>Veja todos os produtos de ${dados.nome.toLowerCase()} disponíveis na nossa loja.</p>
        <a href="loja.html?cat=${slug}" class="btn-cta">Ver produtos de ${dados.nome} →</a>
      </div>
    </div>`;

  // OUTROS ESPORTES
  const outros = listaEsportes.filter(s => s.slug !== slug);
  html += `
    <div class="outros">
      <div class="wrap" style="padding:0 20px;">
        <span class="block-label" style="display:block;text-align:center;">Explore mais</span>
        <h2 style="text-align:center;font-size:26px;font-weight:800;">Outros esportes</h2>
      </div>
      <div class="outros-grid">
        ${outros.map(s => `
            <a href="esporte.html?s=${s.slug}" class="outro-card">
              <div class="e">${s.emoji || '🏅'}</div>
              <div class="n">${s.nome}</div>
            </a>`).join('')}
      </div>
    </div>`;

  app.innerHTML = html;
  window.scrollTo(0, 0);
}

// Renderiza ao carregar
render();

// Re-renderiza se a URL mudar (navegação entre esportes)
window.addEventListener('popstate', render);

  </script>
</body>
</html>
